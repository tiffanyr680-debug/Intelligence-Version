<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 | Functional Workshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #fff; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        [x-cloak] { display: none !important; }
        #code-display { font-family: monospace; font-size: 13px; color: #38bdf8; background: #000; padding: 20px; border-radius: 20px; border: 1px solid #1e293b; white-space: pre-wrap; word-break: break-all; height: 500px; overflow-y: auto; }
    </style>
</head>
<body x-data="realApp()" class="h-screen flex flex-col p-10">

    <div class="max-w-6xl mx-auto w-full flex flex-col gap-10">
        
        <header class="flex justify-between items-center">
            <h1 class="text-3xl font-black italic text-indigo-500">Workshop PRO</h1>
            <div class="flex gap-4">
                <button @click="copyCode()" x-show="generatedCode" class="bg-indigo-600 px-6 py-2 rounded-xl font-bold text-xs">COPY ALL CODE</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <!-- INPUT -->
            <div class="space-y-6">
                <h2 class="text-xl font-bold">What are we building in real life?</h2>
                <div class="glass p-8 rounded-[3rem]">
                    <textarea x-model="prompt" placeholder="e.g. Build me a website for a Law Firm with a contact form..." class="w-full h-40 bg-transparent border-none outline-none text-xl placeholder-slate-800"></textarea>
                    <button @click="buildReal()" class="w-full bg-white text-black font-black py-5 rounded-2xl mt-4 hover:scale-105 active:scale-95 transition-all">GENERATE SOURCE CODE</button>
                </div>
                <div class="flex flex-wrap gap-2">
                    <button @click="prompt = 'Build a Luxury Real Estate Landing Page'" class="bg-white/5 border border-white/10 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition-all">Real Estate Page</button>
                    <button @click="prompt = 'Build a Professional Law Firm Website'" class="bg-white/5 border border-white/10 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition-all">Law Firm Site</button>
                </div>
            </div>

            <!-- OUTPUT -->
            <div class="space-y-6">
                <h2 class="text-xl font-bold">Generated Source Code</h2>
                <div x-show="!generatedCode" class="h-[500px] glass rounded-[3rem] flex flex-col items-center justify-center text-center p-10 opacity-30">
                    <div class="text-6xl mb-6">💿</div>
                    <p>Enter your prompt to generate real, deployable HTML code.</p>
                </div>
                <div x-show="generatedCode" x-cloak>
                    <div id="code-display" x-text="generatedCode"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function realApp() {
            return {
                prompt: '',
                generatedCode: '',
                buildReal() {
                    if(!this.prompt) return;
                    
                    // Logic to build a REAL webpage string based on keywords
                    let niche = this.prompt.toLowerCase();
                    let color = niche.includes('law') ? '#1e293b' : (niche.includes('estate') ? '#064e3b' : '#6366f1');
                    let title = niche.includes('law') ? 'Justice Partners' : (niche.includes('estate') ? 'Luxury Estates' : 'My Business');

                    this.generatedCode = `<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <title>${title}</title>\n  <script src="https://cdn.tailwindcss.com"></\script>\n</head>\n<body class="bg-slate-50">\n  <nav class="p-6 bg-white border-b flex justify-between font-bold">\n    <div>${title}</div>\n    <div class="flex gap-6 text-sm"><span>Services</span> <span>About</span> <span>Contact</span></div>\n  </nav>\n  <header class="py-32 px-10 text-center">\n    <h1 class="text-6xl font-black mb-6" style="color: ${color}">Excellence Defined.</h1>\n    <p class="text-xl text-slate-500 max-w-2xl mx-auto">We provide the highest quality services for ${this.prompt.split(' ').slice(-1)} clients.</p>\n    <button class="mt-10 px-12 py-5 rounded-2xl text-white font-bold" style="background: ${color}">Get Started</button>\n  </header>\n</body>\n</html>`;
                },
                copyCode() {
                    navigator.clipboard.writeText(this.generatedCode);
                    alert("Source Code Copied! You can now paste this into a new file and upload to Vercel.");
                }
            }
        }
    </script>
</body>
</html>
