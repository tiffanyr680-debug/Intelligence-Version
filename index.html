<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 | AI App Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; }
        .glass { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255,255,255,0.05); }
        .btn-deploy { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; font-weight: 800; transition: 0.3s; }
        .btn-deploy:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(168, 85, 247, 0.4); }
        .sidebar-icon { font-size: 1.5rem; color: #64748b; cursor: pointer; transition: 0.2s; }
        .sidebar-icon:hover { color: #fff; }
        [x-cloak] { display: none !important; }
        @keyframes scan { 0% { top: 0% } 100% { top: 100% } }
        .scan-line { position: absolute; height: 2px; width: 100%; background: #6366f1; animation: scan 3s linear infinite; z-index: 20; }
        #code-editor { font-family: monospace; background: transparent; color: #38bdf8; width: 100%; height: 100%; padding: 20px; outline: none; resize: none; }
    </style>
</head>
<body x-data="factoryApp()" x-init="init()" class="h-screen flex overflow-hidden">

    <!-- SIDEBAR (Matches Screenshot) -->
    <aside class="w-24 bg-black border-r border-white/5 flex flex-col items-center py-10 gap-10">
        <div class="h-14 w-14 bg-indigo-600 rounded-2xl flex items-center justify-center font-black text-white text-3xl shadow-2xl shadow-indigo-500/20">B</div>
        <nav class="flex flex-col gap-10">
            <span class="sidebar-icon">📁</span>
            <span class="sidebar-icon">🚀</span>
        </nav>
    </aside>

    <!-- MAIN INTERFACE -->
    <main class="flex-1 flex flex-col">
        
        <!-- TOP HEADER -->
        <header class="h-20 border-b border-white/5 flex items-center px-10 justify-between bg-black/50">
            <div class="flex items-center gap-6">
                <h1 class="text-xl font-bold tracking-tight text-white opacity-90 uppercase text-xs tracking-[0.2em]">AI App Engine</h1>
                <div class="flex items-center gap-2 bg-white/5 px-4 py-2 rounded-full border border-white/5">
                    <div class="flex gap-1.5">
                        <div class="w-2 h-2 rounded-full bg-slate-700"></div>
                        <div class="w-2 h-2 rounded-full bg-slate-700"></div>
                        <div class="w-2 h-2 rounded-full bg-slate-700"></div>
                    </div>
                    <span class="text-[10px] font-mono text-slate-500 ml-2" x-text="liveUrl">localhost:3000</span>
                </div>
            </div>
            <button @click="alert('Initiating Enterprise Deployment...')" class="btn-deploy px-10 py-4 rounded-2xl text-sm uppercase tracking-widest">Deploy Live</button>
        </header>

        <div class="flex-1 flex overflow-hidden">
            
            <!-- LEFT: PROMPT PANEL -->
            <div class="w-[400px] border-r border-white/5 p-10 flex flex-col gap-8">
                <div class="glass p-8 rounded-[2.5rem] border-indigo-500/10">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] block mb-6">Prompt the AI</label>
                    <textarea x-model="prompt" placeholder="e.g. Build a Lead CRM or a Task Tracker..." 
                              class="w-full bg-transparent border-none text-slate-200 outline-none h-48 text-lg leading-relaxed placeholder-slate-800"></textarea>
                    <button @click="generateApp()" :disabled="status === 'building'" class="w-full bg-white text-black font-black py-5 rounded-2xl mt-6 hover:scale-[1.02] active:scale-95 transition-all shadow-2xl">
                        GENERATE SYSTEM
                    </button>
                </div>

                <!-- BUILD LOGS -->
                <div x-show="status !== 'idle'" x-cloak class="space-y-4 px-4">
                    <p class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Logic Stream</p>
                    <div class="font-mono text-[11px] space-y-2 text-indigo-400/80">
                        <p x-show="logStep >= 1">> Initiating Synthesis...</p>
                        <p x-show="logStep >= 2">> Mapping Component Tree...</p>
                        <p x-show="logStep >= 3" class="text-emerald-500">> Render Successful.</p>
                    </div>
                </div>
            </div>

            <!-- RIGHT: PREVIEW AREA (Matches Screenshot Crane Icon) -->
            <div class="flex-1 bg-[#0a0a0a] p-12 relative flex items-center justify-center">
                <div id="preview-box" class="w-full h-full glass rounded-[4rem] overflow-hidden relative border-white/5 flex flex-col shadow-2xl">
                    
                    <!-- View Tabs -->
                    <div class="flex gap-1 p-4 bg-black/20 border-b border-white/5">
                        <button @click="mode = 'preview'" :class="mode === 'preview' ? 'bg-white/10 text-white' : 'text-slate-600'" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition-all">Preview</button>
                        <button @click="mode = 'code'" :class="mode === 'code' ? 'bg-white/10 text-white' : 'text-slate-600'" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition-all">Code</button>
                    </div>

                    <!-- Main Window -->
                    <div class="flex-1 relative overflow-auto">
                        <!-- Empty State (Crane Icon) -->
                        <div x-show="status === 'idle'" class="absolute inset-0 flex flex-col items-center justify-center text-center opacity-20">
                            <div class="text-9xl mb-6">🏗️</div>
                            <h2 class="text-xl font-bold text-slate-400">APP PREVIEW</h2>
                        </div>

                        <!-- Loading State -->
                        <div x-show="status === 'building'" x-cloak class="absolute inset-0 z-50 bg-black/90 flex items-center justify-center">
                            <div class="scan-line"></div>
                            <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        </div>

                        <!-- Content Render -->
                        <div x-show="mode === 'preview'" class="h-full w-full" id="render-target"></div>
                        <div x-show="mode === 'code'" x-cloak class="h-full w-full">
                            <textarea id="code-editor" x-model="generatedCode" @input="syncPreview()"></textarea>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function factoryApp() {
            return {
                mode: 'preview',
                status: 'idle',
                prompt: '',
                logStep: 0,
                generatedCode: '',
                liveUrl: 'localhost:3000',

                init() { console.log('Base44 Logic Online'); },

                generateApp() {
                    if(!this.prompt) return;
                    this.status = 'building';
                    this.logStep = 1;
                    
                    let logInt = setInterval(() => {
                        this.logStep++;
                        if(this.logStep > 3) clearInterval(logInt);
                    }, 1000);

                    setTimeout(() => {
                        const input = this.prompt.toLowerCase();
                        let html = '';

                        if (input.includes('crm')) {
                            html = `<div class="p-16"><h1 class="text-5xl font-black mb-10 italic">Pipeline</h1><div class="grid grid-cols-1 gap-6">${['Global Corp', 'Nexus Ltd'].map(n => `<div class="bg-white/5 border border-white/10 p-10 rounded-[2.5rem] flex justify-between items-center"><div class="text-2xl font-bold">${n}</div><button class="bg-indigo-600 px-8 py-3 rounded-2xl text-sm font-bold">Manage</button></div>`).join('')}</div></div>`;
                        } else {
                            html = `<div class="h-full flex items-center justify-center"><div class="bg-emerald-500/10 text-emerald-500 px-10 py-5 rounded-full border border-emerald-500/30 font-black text-2xl">SYSTEM ONLINE</div></div>`;
                        }

                        this.generatedCode = html;
                        this.syncPreview();
                        this.status = 'complete';
                        this.liveUrl = 'https://demo-app.vercel.app';
                    }, 3500);
                },

                syncPreview() {
                    document.getElementById('render-target').innerHTML = this.generatedCode;
                }
            }
        }
    </script>
</body>
</html>
