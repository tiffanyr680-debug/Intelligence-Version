<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 | Functional AI Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050505; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .builder-active { border-color: #6366f1; box-shadow: 0 0 40px rgba(99, 102, 241, 0.2); }
        [x-cloak] { display: none !important; }
        @keyframes scan { 0% { top: 0% } 100% { top: 100% } }
        .scan-line { position: absolute; height: 2px; width: 100%; background: #6366f1; animation: scan 3s linear infinite; z-index: 20; }
        #code-editor { font-family: monospace; line-height: 1.5; background: transparent; color: #38bdf8; width: 100%; height: 100%; padding: 20px; outline: none; resize: none; }
    </style>
</head>
<body x-data="factoryApp()" x-init="init()" class="h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-20 border-r border-white/5 flex flex-col items-center py-8 gap-8 bg-black">
        <div class="h-10 w-10 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-xl cursor-pointer">B</div>
        <div class="mt-auto flex flex-col gap-4 items-center">
            <div :class="aiReady ? 'bg-emerald-500' : 'bg-amber-500'" class="h-2 w-2 rounded-full animate-pulse"></div>
            <span class="text-[8px] font-bold text-slate-600 uppercase">AI Status</span>
        </div>
    </aside>

    <main class="flex-1 flex">
        
        <!-- PROMPT PANEL -->
        <div class="w-1/3 border-r border-white/5 p-8 flex flex-col gap-6">
            <h1 class="text-xl font-bold tracking-tight">App Architect</h1>
            
            <div class="glass p-6 rounded-3xl border-indigo-500/20">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4">What shall the AI build?</label>
                <textarea x-model="prompt" placeholder="e.g. Build a client list with names and status..." 
                          class="w-full bg-transparent border-none text-slate-200 outline-none h-32 text-sm leading-relaxed"></textarea>
                <button @click="generateApp()" :disabled="status === 'building'" class="w-full bg-white text-black font-black py-4 rounded-xl mt-4 hover:scale-[1.02] active:scale-95 transition-all">
                    BUILD APPLICATION
                </button>
            </div>

            <div x-show="status !== 'idle'" class="space-y-3">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Compiler Logs</p>
                <div class="font-mono text-[10px] space-y-1 text-indigo-400">
                    <p x-show="logStep >= 1">> Loading Local Model Assets...</p>
                    <p x-show="logStep >= 2">> Parsing intent: <span class="text-white" x-text="prompt"></span></p>
                    <p x-show="logStep >= 3">> Generating Component Tree...</p>
                    <p x-show="logStep >= 4" class="text-emerald-400 font-bold">> Build Verified. Preview Updated.</p>
                </div>
            </div>
        </div>

        <!-- WORKSPACE -->
        <div class="flex-1 bg-[#0a0a0a] flex flex-col">
            <div class="h-14 border-b border-white/5 flex items-center px-8 justify-between bg-black/40">
                <div class="flex gap-2">
                    <button @click="mode = 'preview'" :class="mode === 'preview' ? 'bg-indigo-600 text-white' : 'text-slate-500'" class="px-4 py-1.5 rounded-lg text-[10px] font-bold transition-all uppercase tracking-widest">Preview</button>
                    <button @click="mode = 'code'" :class="mode === 'code' ? 'bg-indigo-600 text-white' : 'text-slate-500'" class="px-4 py-1.5 rounded-lg text-[10px] font-bold transition-all uppercase tracking-widest">Code</button>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-mono text-slate-600 bg-white/5 px-3 py-1 rounded" x-text="liveUrl"></span>
                    <button class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-xs font-bold shadow-xl">PUBLISH</button>
                </div>
            </div>

            <div class="flex-1 p-12 flex items-center justify-center relative">
                <div id="app-viewport" class="w-full h-full glass rounded-[3rem] overflow-hidden relative border-white/5">
                    
                    <div x-show="status === 'building'" class="absolute inset-0 z-50 bg-black/90 flex flex-col items-center justify-center text-center">
                        <div class="scan-line"></div>
                        <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                    </div>

                    <div x-show="mode === 'preview'" class="h-full w-full overflow-auto" id="app-preview-container">
                        <!-- Content Injected Here -->
                         <div x-show="status === 'idle'" class="h-full flex items-center justify-center text-slate-700 italic">No app generated yet.</div>
                    </div>

                    <div x-show="mode === 'code'" x-cloak class="h-full w-full bg-black/40">
                        <textarea id="code-editor" x-model="generatedCode" @input="syncPreview()"></textarea>
                    </div>

                </div>
            </div>
        </div>

    </main>

    <script>
        function factoryApp() {
            return {
                prompt: '',
                status: 'idle',
                mode: 'preview',
                logStep: 0,
                generatedCode: '',
                liveUrl: 'localhost:3000',
                aiReady: false,

                init() { 
                    setTimeout(() => { this.aiReady = true; }, 2000);
                },

                generateApp() {
                    if(!this.prompt) return;
                    this.status = 'building';
                    this.logStep = 1;
                    
                    let interval = setInterval(() => {
                        this.logStep++;
                        if(this.logStep > 4) clearInterval(interval);
                    }, 800);

                    // LOGIC ENGINE: Constructs the app based on input
                    setTimeout(() => {
                        const input = this.prompt.toLowerCase();
                        let html = '';

                        if (input.includes('crm') || input.includes('leads')) {
                            html = `<div class="p-12"><h1 class="text-4xl font-black mb-8">Sales CRM</h1><div class="space-y-4"><div class="bg-white/5 p-6 rounded-2xl border border-white/10 flex justify-between"><div><p class="font-bold">Lead #001</p><p class="text-xs text-slate-500">Status: Hot</p></div><button class="bg-indigo-600 px-4 py-2 rounded-lg text-xs">Email</button></div></div></div>`;
                        } else if (input.includes('tasks') || input.includes('todo')) {
                            html = `<div class="p-12"><h1 class="text-4xl font-black mb-8 text-indigo-500 text-center">Master Tasks</h1><div class="max-w-md mx-auto bg-white/5 p-10 rounded-[3rem] border border-white/5"><div class="flex items-center gap-4 mb-4"><input type="checkbox" class="h-5 w-5"><p>Build new SaaS empire</p></div></div></div>`;
                        } else {
                            html = `<div class="h-full flex flex-col items-center justify-center"><div class="text-6xl mb-4">🚀</div><h2 class="text-2xl font-bold">Custom Build Ready</h2><p class="text-slate-500 mt-2">"${this.prompt}"</p></div>`;
                        }

                        this.generatedCode = html;
                        this.syncPreview();
                        this.status = 'complete';
                        this.liveUrl = `https://${this.prompt.split(' ')[0].toLowerCase()}-app.vercel.app`;
                    }, 3000);
                },

                syncPreview() {
                    document.getElementById('app-preview-container').innerHTML = this.generatedCode;
                }
            }
        }
    </script>
</body>
</html>
