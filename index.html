<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base44 | Turn Ideas into Apps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .hero-gradient { background: linear-gradient(180deg, #dcf0fb 0%, #ffffff 100%); }
        .glass-dark { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .input-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1); }
        .pill-btn { border: 1px solid #e2e8f0; color: #475569; padding: 10px 24px; border-radius: 99px; font-weight: 500; font-size: 14px; transition: 0.2s; }
        .pill-btn:hover { background: #f8fafc; border-color: #cbd5e1; transform: translateY(-2px); }
        [x-cloak] { display: none !important; }
        @keyframes scan { 0% { top: 0% } 100% { top: 100% } }
        .scan-line { position: absolute; height: 2px; width: 100%; background: #6366f1; animation: scan 3s linear infinite; z-index: 20; }
    </style>
</head>
<body x-data="baseApp()">

    <!-- 1. LANDING PAGE (Matches your screenshot exactly) -->
    <div x-show="view === 'landing'" class="min-h-screen hero-gradient flex flex-col items-center pt-24 px-6 text-center">
        
        <!-- Top Toggle -->
        <div class="bg-white/60 border border-slate-200 p-1.5 rounded-2xl flex gap-1 mb-20 shadow-sm">
            <button class="bg-white shadow-sm px-6 py-2 rounded-xl font-bold text-sm text-slate-900">Apps</button>
            <button class="px-6 py-2 rounded-xl font-bold text-sm text-slate-500 hover:text-slate-900 relative">
                Superagents 
                <span class="absolute -top-1 -right-4 bg-orange-100 text-orange-600 text-[8px] font-black px-1.5 py-0.5 rounded-full uppercase">New</span>
            </button>
        </div>

        <h1 class="text-6xl md:text-7xl font-extrabold text-slate-900 mb-6 tracking-tight">Turn your ideas into apps</h1>
        <p class="text-slate-600 text-lg max-w-xl mb-12">Base44 lets you build fully-functional apps in minutes with just your words. No coding necessary.</p>

        <!-- Search / Prompt Box -->
        <div class="w-full max-w-3xl bg-white border border-slate-200 rounded-[2.5rem] p-4 input-shadow mb-12">
            <textarea x-model="prompt" placeholder="Build a professional CRM for my marketing agency..." class="w-full h-32 px-6 py-4 text-xl outline-none resize-none placeholder-slate-300 text-slate-800"></textarea>
            <div class="flex items-center justify-between px-4 pb-2">
                <div class="flex items-center gap-6">
                    <span class="text-2xl text-slate-300 cursor-pointer hover:text-slate-500">+</span>
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-4 bg-slate-100 rounded-full relative">
                            <div class="w-3 h-3 bg-white rounded-full absolute left-0.5 top-0.5 shadow-sm"></div>
                        </div>
                        <span class="text-xs font-bold text-slate-400">Plan</span>
                        <span class="text-slate-300 text-xs">ⓘ</span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-slate-400">🎙️</span>
                    <button @click="startBuild()" class="h-12 w-12 bg-orange-600 rounded-full flex items-center justify-center shadow-lg hover:bg-orange-700 active:scale-90 transition-all">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Suggestion Pills (NOW WORKING) -->
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6">Not sure where to start? Try one of these:</p>
        <div class="flex flex-wrap justify-center gap-3 max-w-2xl mb-20">
            <button @click="prompt = 'Build a Reporting Dashboard'" class="pill-btn">Reporting Dashboard</button>
            <button @click="prompt = 'Build a Gaming Platform'" class="pill-btn">Gaming Platform</button>
            <button @click="prompt = 'Build an Onboarding Portal'" class="pill-btn">Onboarding Portal</button>
            <button @click="prompt = 'Build a Room Visualizer'" class="pill-btn">Room Visualizer</button>
            <button @click="prompt = 'Build a Networking App'" class="pill-btn">Networking App</button>
        </div>
    </div>

    <!-- 2. DASHBOARD VIEW (Dark Mode High-Tech) -->
    <div x-show="view === 'dashboard'" x-cloak class="h-screen bg-black flex overflow-hidden">
        <aside class="w-24 border-r border-white/5 flex flex-col items-center py-10 gap-10">
            <div class="h-14 w-14 bg-indigo-600 rounded-2xl flex items-center justify-center font-black text-white text-3xl shadow-2xl cursor-pointer" @click="view = 'landing'">B</div>
            <nav class="flex flex-col gap-10 text-slate-700 text-xl">
                <span>📁</span>
                <span>🚀</span>
            </nav>
        </aside>
        
        <main class="flex-1 flex flex-col">
            <header class="h-20 border-b border-white/5 flex items-center px-10 justify-between">
                <div class="flex items-center gap-4 bg-white/5 px-6 py-2 rounded-full border border-white/5">
                    <span class="text-[10px] font-mono text-slate-400"> Tiffany: project-300.vercel.app</span>
                </div>
                <button @click="view = 'landing'" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold text-sm">DEPLOY LIVE</button>
            </header>

            <div class="flex-1 flex p-10 gap-8 overflow-hidden">
                <div class="w-80 space-y-6">
                    <div class="glass-dark p-6 rounded-3xl">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4">Edit Current Prompt</label>
                        <textarea x-model="prompt" class="w-full bg-transparent border-none text-slate-200 outline-none h-24 text-sm"></textarea>
                        <button @click="startBuild()" class="w-full bg-white text-black font-bold py-3 rounded-xl mt-4 text-xs">REGENERATE</button>
                    </div>
                </div>
                
                <!-- PREVIEW BOX -->
                <div class="flex-1 glass-dark rounded-[3rem] overflow-hidden relative border-indigo-500/20">
                    <div x-show="building" class="absolute inset-0 z-50 bg-black flex flex-col items-center justify-center">
                        <div class="scan-line"></div>
                        <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                        <p class="text-indigo-400 font-bold uppercase tracking-widest text-xs">Assembling Your Application...</p>
                    </div>
                    <div id="demo-content" class="h-full w-full overflow-auto">
                        <!-- Code Injected Here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function baseApp() {
            return {
                view: 'landing',
                prompt: '',
                building: false,
                startBuild() {
                    if(!this.prompt) return;
                    this.view = 'dashboard';
                    this.building = true;
                    
                    setTimeout(() => {
                        const input = this.prompt.toLowerCase();
                        let html = '';
                        if (input.includes('dashboard') || input.includes('crm')) {
                            html = `<div class="p-16"><h2 class="text-5xl font-black mb-10">Sales Intelligence</h2><div class="grid grid-cols-2 gap-6"><div class="bg-white/5 p-10 rounded-[2rem] border border-white/5"><h4>$45,200</h4><p class="text-slate-500">Revenue</p></div><div class="bg-white/5 p-10 rounded-[2rem] border border-white/5"><h4>824</h4><p class="text-slate-500">Leads</p></div></div></div>`;
                        } else {
                            html = `<div class="h-full flex items-center justify-center text-3xl font-black italic">Tiffany's Custom App Live.</div>`;
                        }
                        document.getElementById('demo-content').innerHTML = html;
                        this.building = false;
                    }, 3000);
                }
            }
        }
    </script>
</body>
</html>
